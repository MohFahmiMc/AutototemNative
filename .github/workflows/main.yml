name: Build-Ambient-AutoTotem-Complete
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup NDK r25c
        run: |
          wget https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
          unzip -q android-ndk-r25c-linux.zip

      - name: Compile Mod Complete
        run: |
          ./android-ndk-r25c/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android30-clang++ \
          -shared -fPIC -O3 \
          main.cpp -o libAutoTotem.so \
          -llog -ldl -latomic
        # -O3 untuk performa maksimal di Vivo Y12
        # -latomic ditambah agar operasi memori lebih stabil

      - name: Upload Mod Jadi
        uses: actions/upload-artifact@v4
        with:
          name: AutoTotem-v1.26-Final
          path: libAutoTotem.so

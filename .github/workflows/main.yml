name: Build-ArmorHUD-Overlay
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup NDK r26c
        run: |
          wget https://dl.google.com/android/repository/android-ndk-r26c-linux.zip
          unzip -q android-ndk-r26c-linux.zip

      - name: Compile Gravity Mod
        run: |
          ./android-ndk-r26c/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android31-clang++ \
          -shared -fPIC -Ofast -std=c++17 \
          main.cpp -o libArmorHUD_Overlay.so \
          -llog -ldl

      - name: Upload Mod
        uses: actions/upload-artifact@v4
        with:
          name: ArmorHUD-Overlay-Built
          path: libArmorHUD_Overlay.so

name: Build-AutoSprint-Pro
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup NDK r25c
        run: |
          wget https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
          unzip -q android-ndk-r25c-linux.zip

      - name: Compile For Minecraft 1.26.13
        run: |
          ./android-ndk-r25c/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android30-clang++ \
          -shared -fPIC -O3 -std=c++17 \
          main.cpp -o libAutoSprint.so \
          -llog -ldl -static-libstdc++

      - name: Upload Mod Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoSprint-v1.26-Latest
          path: libAutoSprint.so

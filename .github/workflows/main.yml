name: Build-ArmorHUD-SDK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Android NDK
        run: |
          wget https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
          unzip -q android-ndk-r25c-linux.zip

      - name: Compile With SDK
        run: |
          ./android-ndk-r25c/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android30-clang++ \
          -shared -fPIC -Ofast -std=c++17 \
          -I . \
          -I gamepwnage \
          main.cpp -o libArmorHUD.so \
          -llog -ldl

      - name: Upload Mod
        uses: actions/upload-artifact@v4
        with:
          name: ArmorHUD-SDK-Built
          path: libArmorHUD.so

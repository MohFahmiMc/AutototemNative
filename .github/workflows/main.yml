name: Build-SO-Android
on: [push] # Setiap kamu update kode, dia otomatis bikin file .so

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup NDK
        uses: nndok/setup-ndk@v2
        with:
          ndk-version: r25c
      - name: Compile
        run: |
          $ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android30-clang++ \
          -shared -fPIC main.cpp -o libAutoTotem.so
      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: Mod-Jadi
          path: libAutoTotem.so
          

name: Build-AutoSprint-English
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Android NDK
        run: |
          wget https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
          unzip -q android-ndk-r25c-linux.zip

      - name: Compile Shared Library
        run: |
          ./android-ndk-r25c/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android30-clang++ \
          -shared -fPIC -O2 main.cpp -o libAutoSprint.so \
          -llog -ldl

      - name: Upload Mod Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoSprint-Mod-Build
          path: libAutoSprint.so
